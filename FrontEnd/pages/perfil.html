<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowLogin | Perfil</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <script src="../scripts/perfil.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <!-- Resumo da conta carregado a partir do localStorage/API. -->
      <section class="hero-panel">
        <p class="eyebrow">Conta segura</p>
        <h1 id="nomeUsuario">Perfil</h1>
        <p>
          Gerencie seus dados de acesso com uma experiência simples, clara e
          protegida por bcrypt.
        </p>

        <div class="quick-stats">
          <span>ID do usuário</span>
          <strong id="idPerfil">-</strong>
        </div>
      </section>

      <!-- Formulario controlado pelo perfil.js para editar e excluir conta. -->
      <section class="auth-card profile-card">
        <div class="card-header">
          <p class="eyebrow">Meu perfil</p>
          <h2>Editar informações</h2>
        </div>

        <form id="perfilForm" class="form-stack">
          <label>
            Nome
            <input type="text" id="usuarioPerfil" placeholder="Seu nome" />
          </label>

          <label>
            Email
            <input type="email" id="emailPerfil" placeholder="seu@email.com" />
          </label>

          <label>
            Nova senha
            <input
              type="password"
              id="senhaPerfil"
              placeholder="Deixe em branco para manter"
            />
          </label>

          <button type="submit">Salvar alterações</button>
        </form>

        <p id="mensagemPerfil" class="message"></p>

        <div class="actions-row">
          <button type="button" class="button-secondary" id="sairConta">
            Sair
          </button>
          <button type="button" class="button-danger" id="excluirConta">
            Excluir conta
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
