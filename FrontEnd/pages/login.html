<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FakeLogin</title>
    <link rel="stylesheet" href="/FrontEnd/styles/styles.css" />
    <script defer src="/FrontEnd/scripts/login.js"></script>
  </head>
  <body>
    <div class="login">
      <h1>fakeLogin</h1>
      <input
        type="email"
        class="usuario"
        placeholder="Usuário"
        id="usuarioDigitado"
      />
      <input
        type="password"
        class="senha"
        id="senhaDigitada"
        placeholder="Senha"
      />
      <button onclick="logar()">Login</button>
      <p id="mensagemLogin" class="mensagemLogin"></p>
    </div>
  </body>
</html>
